<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="sign_language_translator">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>sign_language_translator</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
  
  <script type="module">
    import { FilesetResolver, HandLandmarker, PoseLandmarker } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.8/vision_bundle.mjs";

    let handLandmarker = null;
    let poseLandmarker = null;
    let webcamStream = null;
    let animationFrameId = null;
    let activeVideo = null;
    let activeCanvas = null;
    let onLandmarksCallback = null;

    async function initLandmarker() {
      if (handLandmarker && poseLandmarker) return { handLandmarker, poseLandmarker };
      
      const vision = await FilesetResolver.forVisionTasks(
        "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.8/wasm"
      );
      
      if (!handLandmarker) {
        handLandmarker = await HandLandmarker.createFromOptions(vision, {
          baseOptions: {
            modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
            delegate: "GPU"
          },
          runningMode: "VIDEO",
          numHands: 2,
          minHandDetectionConfidence: 0.75,
          minHandPresenceConfidence: 0.75,
          minTrackingConfidence: 0.75
        });
        console.log("[✓] JS MediaPipe HandLandmarker initialized successfully.");
      }

      if (!poseLandmarker) {
        poseLandmarker = await PoseLandmarker.createFromOptions(vision, {
          baseOptions: {
            modelAssetPath: "https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_full/float16/1/pose_landmarker_full.task",
            delegate: "GPU"
          },
          runningMode: "VIDEO",
          minPoseDetectionConfidence: 0.75,
          minPosePresenceConfidence: 0.75,
          minTrackingConfidence: 0.75
        });
        console.log("[✓] JS MediaPipe PoseLandmarker initialized successfully.");
      }
      
      return { handLandmarker, poseLandmarker };
    }

    window.aslWebTracker = {
      isInitialized: () => handLandmarker !== null && poseLandmarker !== null,
      
      initialize: async () => {
        try {
          await initLandmarker();
          return true;
        } catch (e) {
          console.error("[-] Failed to initialize landmarkers:", e);
          return false;
        }
      },
      
      start: async (videoElement, canvasElement, callback) => {
        console.log("[*] Starting web pose and hand tracking...");
        activeVideo = videoElement;
        activeCanvas = canvasElement;
        onLandmarksCallback = callback;
        
        await initLandmarker();
        
        try {
          webcamStream = await navigator.mediaDevices.getUserMedia({
            video: { width: 640, height: 480, facingMode: "user" },
            audio: false
          });
          activeVideo.srcObject = webcamStream;
          activeVideo.addEventListener("loadeddata", predictLoop);
        } catch (err) {
          console.error("[-] Failed to open webcam for web tracking: " + err);
          if (onLandmarksCallback) {
            onLandmarksCallback(JSON.stringify({
              error: "camera_access_failed",
              message: err.message || "Could not access the camera. Make sure permissions are granted."
            }));
          }
        }
      },
      
      stop: () => {
        console.log("[*] Stopping web pose and hand tracking...");
        if (animationFrameId) {
          cancelAnimationFrame(animationFrameId);
          animationFrameId = null;
        }
        if (webcamStream) {
          webcamStream.getTracks().forEach(track => track.stop());
          webcamStream = null;
        }
        if (activeVideo) {
          activeVideo.srcObject = null;
          activeVideo.removeEventListener("loadeddata", predictLoop);
          activeVideo = null;
        }
        if (activeCanvas) {
          const ctx = activeCanvas.getContext("2d");
          ctx.clearRect(0, 0, activeCanvas.width, activeCanvas.height);
          activeCanvas = null;
        }
        onLandmarksCallback = null;
      }
    };

    // Global state for EMA landmark smoothing
    let emaLeftHand = null;
    let emaRightHand = null;
    let emaPose = null;
    const SMOOTHING_FACTOR = 0.4; // EMA smoothing weight

    function smoothPoints(rawPoints, side) {
      if (!rawPoints || rawPoints.length === 0) {
        if (side === "Left") emaLeftHand = null;
        else if (side === "Right") emaRightHand = null;
        else if (side === "Pose") emaPose = null;
        return null;
      }
      
      let ema = null;
      if (side === "Left") ema = emaLeftHand;
      else if (side === "Right") ema = emaRightHand;
      else if (side === "Pose") ema = emaPose;

      if (!ema || ema.length !== rawPoints.length) {
        ema = rawPoints.map(lm => ({ x: lm.x, y: lm.y, z: lm.z }));
      } else {
        for (let i = 0; i < rawPoints.length; i++) {
          if (!rawPoints[i]) continue;
          ema[i].x = (SMOOTHING_FACTOR * rawPoints[i].x) + ((1 - SMOOTHING_FACTOR) * ema[i].x);
          ema[i].y = (SMOOTHING_FACTOR * rawPoints[i].y) + ((1 - SMOOTHING_FACTOR) * ema[i].y);
          ema[i].z = (SMOOTHING_FACTOR * (rawPoints[i].z || 0.0)) + ((1 - SMOOTHING_FACTOR) * (ema[i].z || 0.0));
        }
      }
      
      if (side === "Left") emaLeftHand = ema;
      else if (side === "Right") emaRightHand = ema;
      else if (side === "Pose") emaPose = ema;

      return ema;
    }

    async function predictLoop() {
      if (!activeVideo || !handLandmarker || !poseLandmarker) return;
      
      if (activeVideo.videoWidth > 0 && activeVideo.videoHeight > 0) {
        if (activeCanvas) {
          if (activeCanvas.width !== activeVideo.videoWidth) {
            activeCanvas.width = activeVideo.videoWidth;
            activeCanvas.height = activeVideo.videoHeight;
          }
          
          const ctx = activeCanvas.getContext("2d");
          ctx.clearRect(0, 0, activeCanvas.width, activeCanvas.height);
          
          ctx.save();
          ctx.translate(activeCanvas.width, 0);
          ctx.scale(-1, 1);
          ctx.drawImage(activeVideo, 0, 0, activeCanvas.width, activeCanvas.height);
          ctx.restore();
          
          const startTimeMs = performance.now();
          const poseResults = poseLandmarker.detectForVideo(activeVideo, startTimeMs);
          const handResults = handLandmarker.detectForVideo(activeVideo, startTimeMs);
          
          // Construct points array: 4 pose joints + 21 left hand joints + 21 right hand joints = 46 points total (138 values)
          let landmarksToSend = Array.from({ length: 46 }, () => ({ x: 0.0, y: 0.0, z: 0.0 }));
          
          let anchorX = 0.5;
          let anchorY = 0.5;
          let anchorZ = 0.0;
          let hasPose = false;
          
          // 1. Process Pose Landmarks: Left Shoulder (11), Right Shoulder (12), Left Elbow (13), Right Elbow (14)
          if (poseResults.landmarks && poseResults.landmarks.length > 0) {
            const rawPose = poseResults.landmarks[0];
            const smoothedPose = smoothPoints(rawPose, "Pose");
            
            if (smoothedPose && smoothedPose[11] && smoothedPose[12]) {
              const leftShoulder = smoothedPose[11];
              const rightShoulder = smoothedPose[12];
              const leftElbow = smoothedPose[13] || { x: 0.0, y: 0.0, z: 0.0 };
              const rightElbow = smoothedPose[14] || { x: 0.0, y: 0.0, z: 0.0 };
              const leftWrist = smoothedPose[15] || { x: 0.0, y: 0.0, z: 0.0 };
              const rightWrist = smoothedPose[16] || { x: 0.0, y: 0.0, z: 0.0 };
              const leftHip = smoothedPose[23] || { x: 0.0, y: 0.0, z: 0.0 };
              const rightHip = smoothedPose[24] || { x: 0.0, y: 0.0, z: 0.0 };
              
              // Torso midpoint global origin anchor (mirrored X)
              anchorX = 1.0 - (leftShoulder.x + rightShoulder.x) / 2.0;
              anchorY = (leftShoulder.y + rightShoulder.y) / 2.0;
              anchorZ = (leftShoulder.z + rightShoulder.z) / 2.0;
              hasPose = true;
              
              // Fill Pose features (indices 0 to 3) relative to anchor
              landmarksToSend[0] = { x: (1.0 - leftShoulder.x) - anchorX, y: leftShoulder.y - anchorY, z: leftShoulder.z - anchorZ };
              landmarksToSend[1] = { x: (1.0 - rightShoulder.x) - anchorX, y: rightShoulder.y - anchorY, z: rightShoulder.z - anchorZ };
              landmarksToSend[2] = { x: (1.0 - leftElbow.x) - anchorX, y: leftElbow.y - anchorY, z: leftElbow.z - anchorZ };
              landmarksToSend[3] = { x: (1.0 - rightElbow.x) - anchorX, y: rightElbow.y - anchorY, z: rightElbow.z - anchorZ };
              
              drawPoseSkeleton(ctx, leftShoulder, rightShoulder, leftElbow, rightElbow, leftWrist, rightWrist, leftHip, rightHip, activeCanvas.width, activeCanvas.height);
            }
          }
          
          if (!hasPose) {
            smoothPoints(null, "Pose");
          }
          
          // 2. Identify Left and Right hands from detected meshes
          let leftHandIdx = -1;
          let rightHandIdx = -1;
          
          if (handResults.landmarks && handResults.landmarks.length > 0) {
            for (let i = 0; i < handResults.landmarks.length; i++) {
              if (handResults.handedness[i] && handResults.handedness[i][0]) {
                const side = handResults.handedness[i][0].categoryName;
                if (side === "Left") {
                  leftHandIdx = i;
                } else if (side === "Right") {
                  rightHandIdx = i;
                }
              }
            }
          }
          
          // Process Left Hand (indices 4 to 24 in output array)
          if (leftHandIdx !== -1) {
            const rawLeft = handResults.landmarks[leftHandIdx];
            const smoothedLeft = smoothPoints(rawLeft, "Left");
            if (smoothedLeft) {
              drawSkeleton(ctx, smoothedLeft, activeCanvas.width, activeCanvas.height, "#18b8b5");
              for (let i = 0; i < 21; i++) {
                landmarksToSend[4 + i] = {
                  x: (1.0 - smoothedLeft[i].x) - anchorX,
                  y: smoothedLeft[i].y - anchorY,
                  z: (smoothedLeft[i].z || 0.0) - anchorZ
                };
              }
            }
          } else {
            smoothPoints(null, "Left");
          }
          
          // Process Right Hand (indices 25 to 45 in output array)
          if (rightHandIdx !== -1) {
            const rawRight = handResults.landmarks[rightHandIdx];
            const smoothedRight = smoothPoints(rawRight, "Right");
            if (smoothedRight) {
              drawSkeleton(ctx, smoothedRight, activeCanvas.width, activeCanvas.height, "#e86e58");
              for (let i = 0; i < 21; i++) {
                landmarksToSend[25 + i] = {
                  x: (1.0 - smoothedRight[i].x) - anchorX,
                  y: smoothedRight[i].y - anchorY,
                  z: (smoothedRight[i].z || 0.0) - anchorZ
                };
              }
            }
          } else {
            smoothPoints(null, "Right");
          }
          
          if (onLandmarksCallback) {
            onLandmarksCallback(JSON.stringify(landmarksToSend));
          }
        }
      }
      
      animationFrameId = requestAnimationFrame(predictLoop);
    }

    function drawPoseSkeleton(ctx, leftShoulder, rightShoulder, leftElbow, rightElbow, leftWrist, rightWrist, leftHip, rightHip, width, height) {
      ctx.strokeStyle = "#e1b12c";
      ctx.lineWidth = 6;
      ctx.fillStyle = "#ffffff";
      
      const joints = [leftShoulder, rightShoulder, leftElbow, rightElbow, leftWrist, rightWrist, leftHip, rightHip];
      for (const joint of joints) {
        if (!joint) continue;
        const cx = (1.0 - joint.x) * width;
        const cy = joint.y * height;
        ctx.beginPath();
        ctx.arc(cx, cy, 7, 0, 2 * Math.PI);
        ctx.fill();
      }
      
      ctx.beginPath();
      // Shoulder-to-shoulder connection (11 to 12)
      ctx.moveTo((1.0 - leftShoulder.x) * width, leftShoulder.y * height);
      ctx.lineTo((1.0 - rightShoulder.x) * width, rightShoulder.y * height);
      
      // Left arm connection (11 to 13)
      ctx.moveTo((1.0 - leftShoulder.x) * width, leftShoulder.y * height);
      ctx.lineTo((1.0 - leftElbow.x) * width, leftElbow.y * height);
      
      // Right arm connection (12 to 14)
      ctx.moveTo((1.0 - rightShoulder.x) * width, rightShoulder.y * height);
      ctx.lineTo((1.0 - rightElbow.x) * width, rightElbow.y * height);
      
      // Left elbow to left wrist connection (13 to 15)
      ctx.moveTo((1.0 - leftElbow.x) * width, leftElbow.y * height);
      ctx.lineTo((1.0 - leftWrist.x) * width, leftWrist.y * height);
      
      // Right elbow to right wrist connection (14 to 16)
      ctx.moveTo((1.0 - rightElbow.x) * width, rightElbow.y * height);
      ctx.lineTo((1.0 - rightWrist.x) * width, rightWrist.y * height);
      
      // Left shoulder to left hip connection (11 to 23)
      ctx.moveTo((1.0 - leftShoulder.x) * width, leftShoulder.y * height);
      ctx.lineTo((1.0 - leftHip.x) * width, leftHip.y * height);
      
      // Right shoulder to right hip connection (12 to 24)
      ctx.moveTo((1.0 - rightShoulder.x) * width, rightShoulder.y * height);
      ctx.lineTo((1.0 - rightHip.x) * width, rightHip.y * height);
      
      // Left hip to right hip connection (23 to 24)
      ctx.moveTo((1.0 - leftHip.x) * width, leftHip.y * height);
      ctx.lineTo((1.0 - rightHip.x) * width, rightHip.y * height);
      
      ctx.stroke();
    }

    function drawSkeleton(ctx, landmarks, width, height, color) {
      ctx.strokeStyle = color;
      ctx.lineWidth = 4;
      ctx.fillStyle = "#ffffff";
      
      for (const lm of landmarks) {
        const cx = (1.0 - lm.x) * width;
        const cy = lm.y * height;
        ctx.beginPath();
        ctx.arc(cx, cy, 5, 0, 2 * Math.PI);
        ctx.fill();
      }
      
      const connections = [
        [0, 1], [1, 2], [2, 3], [3, 4],
        [0, 5], [5, 6], [6, 7], [7, 8],
        [9, 10], [10, 11], [11, 12],
        [13, 14], [14, 15], [15, 16],
        [0, 17], [17, 18], [18, 19], [19, 20],
        [5, 9], [9, 13], [13, 17]
      ];
      
      for (const [i, j] of connections) {
        const p1 = landmarks[i];
        const p2 = landmarks[j];
        const x1 = (1.0 - p1.x) * width;
        const y1 = p1.y * height;
        const x2 = (1.0 - p2.x) * width;
        const y2 = p2.y * height;
        
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.stroke();
      }
    }
  </script>
</body>
</html>
